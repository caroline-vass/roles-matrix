.stat-val{font-size:22px;font-weight:500}

th{text-align:left;padding:6px 8px;font-size:11px;font-weight:500;color:#888;border-bottom:1px solid #e5e5e5;white-space:nowrap}
td{padding:6px 8px;border-bottom:1px solid #f5f5f5;vertical-align:middle}
.tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;border:1px solid;white-space:nowrap}
.tag-red{background:#fce8e6;color:#c5221f;border-color:#f5b7b4}
.tag-green{background:#e6f4ea;color:#1a7f37;border-color:#b3dfc0}
.tag-amber{background:#fff8e6;color:#92660a;border-color:#f5d87a}
.tag-gray{background:#f5f5f5;color:#666;border-color:#e0e0e0}
.tag-blue{background:#e8f0fe;color:#1a56db;border-color:#c3d3fb}
.bar-wrap{display:flex;align-items:center;gap:6px}
.bar-bg{width:60px;height:6px;background:#e5e5e5;border-radius:3px;overflow:hidden;flex-shrink:0}
.bar-fill{height:100%;border-radius:3px}
button.dl{padding:7px 16px;font-size:13px;cursor:pointer;border:none;border-radius:6px;color:#fff;font-family:inherit}
select{font-family:inherit;font-size:12px;padding:4px 8px;border:1px solid #ccc;border-radius:4px;background:#fff}
.filter-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.filter-pill{padding:4px 10px;font-size:12px;border-radius:20px;cursor:pointer;font-family:inherit;border:1px solid #e0e0e0;background:#f5f5f5;color:#444}
.filter-pill.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}

let genders = {};

function getBand(role,level){ return BANDS[role+"|"+level]||null; }
function getStatus(sal,band){ if(sal===null)return"Missing salary"; if(!band)return"No band set"; if(sal<band.min)return"Below band"; if(sal>band.max)return"Above band"; return"Within band"; }
function getGap(sal,band){ if(!band||sal===null||sal>=band.min)return 0; return band.min-sal; }
function posPct(sal,band){ if(!band||sal===null)return null; return Math.round(((sal-band.min)/(band.max-band.min))*100); }
function avg(arr){ return arr.length?Math.round(arr.reduce((a,b)=>a+b,0)/arr.length):null; }

function enrich(e){
  const band=getBand(e.role,e.level);
  const sal=e.salary;
  const status=getStatus(sal,band);
  const gap=getGap(sal,band);
  return{...e,band,status,gap,annualGap:gap*12,pos:posPct(sal,band),gender:genders[e.id]||""};
}

function tagHTML(status){
  const map={"Below band":"tag-red","Within band":"tag-green","Above band":"tag-amber","Missing salary":"tag-gray","No band set":"tag-gray"};
  return`<span class="tag ${map[status]||"tag-gray"}">${status}</span>`;
}

function barHTML(pos){
  if(pos===null)return"—";
  const w=Math.max(0,Math.min(100,pos));
  const c=pos<0?"#c5221f":pos>100?"#92660a":"#1a7f37";
  return`<div class="bar-wrap"><div class="bar-bg"><div class="bar-fill" style="width:${w}%;background:${c}"></div></div><span style="font-size:11px;color:#666">${pos}%</span></div>`;
}

function showTab(id){

  document.getElementById("tab-"+id).classList.add("active");
  document.querySelector(`[data-tab="${id}"]`).classList.add("active");
  render();
}

  const totalGap=below.reduce((a,e)=>a+e.annualGap,0);
  const avgSal=avg(emp.filter(e=>e.salary!==null).map(e=>e.salary));

  let h=`<div class="stat-grid">

    <div class="stat-card"><div class="stat-label">Above band</div><div class="stat-val" style="color:#92660a">${above.length}</div></div>
    <div class="stat-card"><div class="stat-label">Missing salary</div><div class="stat-val" style="color:#888">${miss.length}</div></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px">
    <div class="card" style="background:#fce8e6;border-color:#f5b7b4">
      <div style="font-size:12px;color:#888;margin-bottom:2px">Annual cost to bring all below-band to floor</div>
      <div style="font-size:22px;font-weight:500;color:#c5221f">SEK ${totalGap.toLocaleString()}</div>
    </div>
    <div class="card" style="background:#f9f9f9">
      <div style="font-size:12px;color:#888;margin-bottom:2px">Average monthly salary (employees with salary)</div>
      <div style="font-size:22px;font-weight:500">SEK ${avgSal?.toLocaleString()??'—'}</div>
    </div>
  </div>`;

  if(below.length){
    h+=`<div class="card" style="background:#fce8e6;border-color:#f5b7b4;margin-bottom:14px">
      <div class="card-title" style="color:#c5221f">⚠ ${below.length} people are below their salary band</div>`;
    below.sort((a,b)=>b.gap-a.gap).forEach(e=>{
      h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid #f5b7b4;font-size:12px">
        <span><strong>${e.name}</strong> — ${e.role} ${e.level}</span>
        <span style="color:#c5221f">SEK ${e.gap.toLocaleString()}/mo · SEK ${e.annualGap.toLocaleString()}/yr</span>
      </div>`;
    });
    h+=`</div>`;
  }
  if(miss.length){
    h+=`<div class="card" style="background:#f9f9f9"><div class="card-title">Salaries pending (${miss.length} people)</div>`;
    miss.forEach(e=>{ h+=`<div style="font-size:12px;padding:3px 0;color:#666">${e.name} — ${e.role} ${e.level} (${e.team})</div>`; });
    h+=`<div style="font-size:11px;color:#888;margin-top:6px">Management team and new hires. Add salaries once confirmed.</div></div>`;
  }
  document.getElementById("tab-overview").innerHTML=h;
}

    <th>Name</th><th>Role</th><th>Level</th><th>Team</th><th>Salary</th><th>Band min</th><th>Band max</th><th>Position</th><th>Status</th><th>Monthly gap</th>
  </tr></thead><tbody>`;
  filtered.forEach((e,i)=>{
    h+=`<tr style="background:${i%2===0?"#fff":"#fafafa"}">
      <td style="font-weight:500;white-space:nowrap">${e.name}</td>
      <td style="white-space:nowrap">${e.role}</td>
      <td>${e.level}</td>
      <td style="color:#666">${e.team}</td>
      <td>${e.salary!==null?e.salary.toLocaleString():'<span style="color:#aaa">—</span>'}</td>
      <td style="color:#888">${e.band?e.band.min.toLocaleString():"—"}</td>
      <td style="color:#888">${e.band?e.band.max.toLocaleString():"—"}</td>
      <td>${barHTML(e.pos)}</td>
      <td>${tagHTML(e.status)}</td>
      <td style="color:${e.gap>0?"#c5221f":"#888"}">${e.gap>0?"+"+e.gap.toLocaleString():"—"}</td>
    </tr>`;
  });
  h+=`</tbody></table></div>`;
  document.getElementById("tab-employees").innerHTML=h;
}

function renderPriority(){
  const emp=EMPLOYEES.map(enrich);
  const below=emp.filter(e=>e.status==="Below band").sort((a,b)=>b.gap-a.gap);
  const above=emp.filter(e=>e.status==="Above band");
  const totalAnnual=below.reduce((a,e)=>a+e.annualGap,0);
  let h=`<div class="card" style="background:#f9f9f9;margin-bottom:14px">
    <div class="card-body">Sorted by monthly gap. These are the people to prioritise in your next pay review cycle. <strong>Total annual correction cost: SEK ${totalAnnual.toLocaleString()}</strong></div>
  </div>
  <div style="overflow-x:auto"><table><thead><tr>
    <th>#</th><th>Name</th><th>Role</th><th>Level</th><th>Current salary</th><th>Band min</th><th>Monthly gap</th><th>Annual gap</th><th>Action</th>
  </tr></thead><tbody>`;
  below.forEach((e,i)=>{
    h+=`<tr><td style="font-weight:500;color:#c5221f">${i+1}</td><td style="font-weight:500">${e.name}</td><td>${e.role}</td><td>${e.level}</td>
      <td>${e.salary?.toLocaleString()}</td><td style="color:#888">${e.band?.min.toLocaleString()}</td>
      <td style="color:#c5221f;font-weight:500">+${e.gap.toLocaleString()}</td>
      <td style="color:#c5221f">+${e.annualGap.toLocaleString()}</td>
      <td>${tagHTML("Below band")}</td></tr>`;
  });
  above.forEach(e=>{
    const over=e.salary-e.band.max;
    h+=`<tr style="background:#fffdf5"><td style="color:#92660a">↑</td><td style="font-weight:500">${e.name}</td><td>${e.role}</td><td>${e.level}</td>
      <td>${e.salary?.toLocaleString()}</td><td style="color:#888">${e.band?.max.toLocaleString()}</td>
      <td style="color:#92660a">+${over.toLocaleString()} over</td>
      <td style="color:#92660a">+${(over*12).toLocaleString()} over</td>
      <td><span class="tag tag-amber">Freeze — grandfather</span></td></tr>`;
  });
  h+=`</tbody></table></div>`;
  document.getElementById("tab-priority").innerHTML=h;
}

function renderGender(){
  const emp=EMPLOYEES.map(enrich);
  const groups={};
  emp.filter(e=>e.salary!==null).forEach(e=>{
    const key=e.role+"|"+e.level;
    if(!groups[key])groups[key]={role:e.role,level:e.level,m:[],f:[]};
    const g=(genders[e.id]||"").toLowerCase();
    if(["m","male","man"].includes(g))groups[key].m.push(e.salary);
    else if(["f","female","woman","kvinna","k","w"].includes(g))groups[key].f.push(e.salary);
  });
  const rows=Object.values(groups).filter(g=>g.m.length>0&&g.f.length>0);
  let h=`<div class="card" style="background:#f9f9f9;margin-bottom:14px">
    <div class="card-body">Groups with fewer than 5 people are flagged — statistically unreliable and unlikely to require disclosure. Update gender data in the <strong>Update gender</strong> tab for accurate results.</div>
  </div>`;
  if(!rows.length){
    h+=`<div class="card"><div class="card-body">No groups found with both male and female salary data. Add gender data in the Update gender tab first.</div></div>`;
  } else {
    h+=`<div style="overflow-x:auto"><table><thead><tr>
      <th>Role</th><th>Level</th><th>Avg (men)</th><th>n</th><th>Avg (women)</th><th>n</th><th>Gap %</th><th>Group</th><th>Flag</th>
    </tr></thead><tbody>`;
    rows.forEach(g=>{
      const mA=avg(g.m),fA=avg(g.f);
      const gap=mA&&fA?Math.round(((mA-fA)/mA)*100):null;
      const total=g.m.length+g.f.length;
      const small=total<5;
      let gapTag="—";
      if(gap!==null){
        const cl=Math.abs(gap)>=10?"tag-red":Math.abs(gap)>=5?"tag-amber":"tag-green";
        gapTag=`<span class="tag ${cl}">${gap>0?"+":""}${gap}%</span>`;
      }
      let flag=small?`<span style="font-size:11px;color:#888">Too small</span>`:gap===null?"—":Math.abs(gap)>=10?`<span class="tag tag-red">Investigate</span>`:Math.abs(gap)>=5?`<span class="tag tag-amber">Monitor</span>`:`<span class="tag tag-green">OK</span>`;
      h+=`<tr><td style="font-weight:500">${g.role}</td><td>${g.level}</td>
        <td>${mA?.toLocaleString()??"—"}</td><td style="color:#888">${g.m.length}</td>
        <td>${fA?.toLocaleString()??"—"}</td><td style="color:#888">${g.f.length}</td>
        <td>${gapTag}</td>
        <td style="color:${small?"#c5221f":"#666"}">${total}${small?" ⚠":""}</td>
        <td>${flag}</td></tr>`;
    });
    h+=`</tbody></table></div>
    <div class="card" style="background:#f9f9f9;margin-top:14px">
      <div class="card-title">How to read this</div>
      <div class="card-body">Positive % = men earn more. Negative % = women earn more.<br>
      <strong>Under 5%</strong> — OK, monitor annually. <strong>5–10%</strong> — document the objective explanation. <strong>10%+</strong> — requires documented explanation or remediation plan within 90 days.</div>
    </div>`;
  }
  document.getElementById("tab-gender").innerHTML=h;
}

function renderGenderInput(){
  let h=`<div class="card" style="background:#f9f9f9;margin-bottom:14px">
    <div class="card-body">Update gender data here. Changes take effect immediately across all tabs.</div>
  </div>
  <table><thead><tr><th>Name</th><th>Role</th><th>Level</th><th>Gender</th></tr></thead><tbody>`;
  EMPLOYEES.forEach(e=>{
    h+=`<tr><td style="font-weight:500">${e.name}</td><td>${e.role}</td><td>${e.level}</td>
      <td><select onchange="updateGender('${e.id}',this.value)" style="background:${genders[e.id]?"#fff":"#fffdf0"}">
        <option value="">— not set —</option>
        <option value="m"${genders[e.id]==="m"?" selected":""}>Man</option>
        <option value="f"${genders[e.id]==="f"?" selected":""}>Woman</option>
        <option value="other"${genders[e.id]==="other"?" selected":""}>Other / prefer not to say</option>
      </select></td></tr>`;
  });
  h+=`</tbody></table>`;
  document.getElementById("tab-gender-input").innerHTML=h;
}

function renderExport(){
  let h=`<div class="card" style="background:#f9f9f9;margin-bottom:14px">
    <div class="card-body">Download your audit data as CSV. Each export reflects current salary and gender data.</div>
  </div>
  <div class="export-grid">
    <div class="card"><div class="card-title">Full employee audit</div>
      <div class="card-body" style="margin-bottom:12px">All employees with band position, status, and monthly gap.</div>
      <button class="dl" style="width:100%;background:#1a1a1a" onclick="exportCSV('full')">Download full audit CSV</button>
    </div>
    <div class="card"><div class="card-title">Priority list</div>
      <div class="card-body" style="margin-bottom:12px">Below-band employees sorted by gap size, with totals.</div>
      <button class="dl" style="width:100%;background:#c5221f" onclick="exportCSV('priority')">Download priority list CSV</button>
    </div>
    <div class="card"><div class="card-title">Gender gap analysis</div>
      <div class="card-body" style="margin-bottom:12px">Average pay by gender per role and level. For compliance.</div>
      <button class="dl" style="width:100%;background:#185FA5" onclick="exportCSV('gender')">Download gender gap CSV</button>
    </div>
  </div>
  <div class="card" style="background:#f9f9f9">
    <div class="card-title">How to use these exports</div>
    <div class="card-body"><strong>Full audit</strong> — share with leadership. Redact Name column if preferred.<br>
    <strong>Priority list</strong> — agenda for your pay review cycle. Total annual cost at the bottom.<br>
    <strong>Gender gap</strong> — compliance evidence. Add a Justification / action column before archiving.</div>
  </div>`;
  document.getElementById("tab-export").innerHTML=h;
}

function updateGender(id,val){
  genders[id]=val;
  if(activeTab==="gender")renderGender();
}

function setFilter(f){
  filterStatus=f;
  renderEmployees();
}

function toCSV(rows){
  if(!rows.length)return"";
  const h=Object.keys(rows[0]);
  return[h.join(","),...rows.map(r=>h.map(k=>{const v=r[k]??"";return String(v).includes(",")?`"${v}"`:v;}).join(","))].join("\n");
}

function dlCSV(content,filename){
  const a=document.createElement("a");
  a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(content);
  a.download=filename;a.click();
}

function exportCSV(type){
  const emp=EMPLOYEES.map(enrich);
  if(type==="full"){
    dlCSV(toCSV(emp.map(e=>({
      "Employee ID":e.id,"Name":e.name,"Team":e.team,"Role family":e.family,"Role":e.role,"Level":e.level,
      "Employment %":e.pct,"Gender":e.gender,"Current salary (SEK)":e.salary??"",
      "Band min":e.band?.min??""," Band mid":e.band?.mid??"","Band max":e.band?.max??"",
      "Band position %":e.pos??"","Status":e.status,"Monthly gap":e.gap||"","Annual gap":e.annualGap||""
    }))),"festina_pay_audit_full.csv");
  }
  if(type==="priority"){
    const below=emp.filter(e=>e.status==="Below band").sort((a,b)=>b.gap-a.gap);
    const rows=below.map((e,i)=>({
      "Priority":i+1,"Employee ID":e.id,"Name":e.name,"Team":e.team,"Role":e.role,"Level":e.level,
      "Current salary (SEK)":e.salary,"Band min (SEK)":e.band?.min,"Monthly gap (SEK)":e.gap,"Annual gap (SEK)":e.annualGap,"Action":"Correct in next pay review cycle"
    }));
    rows.push({"Priority":"TOTAL","Employee ID":"","Name":"","Team":"","Role":"","Level":"","Current salary (SEK)":"","Band min (SEK)":"",
      "Monthly gap (SEK)":below.reduce((a,e)=>a+e.gap,0),"Annual gap (SEK)":below.reduce((a,e)=>a+e.annualGap,0),"Action":""});
    dlCSV(toCSV(rows),"festina_pay_priority_list.csv");
  }
  if(type==="gender"){
    const groups={};
    emp.filter(e=>e.salary!==null).forEach(e=>{
      const key=e.role+"|"+e.level;
      if(!groups[key])groups[key]={role:e.role,level:e.level,m:[],f:[]};
      const g=(e.gender||"").toLowerCase();
      if(["m","male","man"].includes(g))groups[key].m.push(e.salary);
      else if(["f","female","woman","kvinna","k","w"].includes(g))groups[key].f.push(e.salary);
    });
    dlCSV(toCSV(Object.values(groups).map(g=>{
      const mA=avg(g.m),fA=avg(g.f);
      const gap=mA&&fA?Math.round(((mA-fA)/mA)*100):null;
      const total=g.m.length+g.f.length;
      return{"Role":g.role,"Level":g.level,"Avg salary men (SEK)":mA??""," n (men)":g.m.length,
        "Avg salary women (SEK)":fA??""," n (women)":g.f.length,"Total group":total,
        "Gap %":gap!==null?gap+"%":"","Flag":total<5?"Too small":gap===null?"Insufficient data":Math.abs(gap)>=10?"Investigate":Math.abs(gap)>=5?"Monitor":"OK",
        "Justification / action":""};
    })),"festina_gender_pay_gap.csv");
  }
}

function render(){
  if(activeTab==="overview")renderOverview();
  else if(activeTab==="employees")renderEmployees();
  else if(activeTab==="priority")renderPriority();
  else if(activeTab==="gender")renderGender();
  else if(activeTab==="gender-input")renderGenderInput();
  else if(activeTab==="export")renderExport();
}

buildTabs();
render();
</script>
</body>
